events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    gzip              on;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json image/svg+xml;
    gzip_min_length   256;

    server {
        listen 8080;

        root   /app;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
